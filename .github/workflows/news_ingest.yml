name: News ingest

# Pulls fresh propane-industry news from the public RSS feeds and SEC EDGAR
# every hour. Commits an updated data/news.json (and data/meta.json freshness
# stamp) when the content has changed. Runs entirely on stdlib Python — no
# secrets, no API keys.

on:
  schedule:
    # Top of every hour, UTC. GitHub may delay schedules under heavy load.
    - cron: '7 * * * *'
  workflow_dispatch: {}   # allow manual runs from the Actions tab

permissions:
  contents: write

concurrency:
  group: news-ingest
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run news_ingest.py
        run: python scripts/news_ingest.py

      - name: Commit if changed
        run: |
          git config user.name  "pi-news-bot"
          git config user.email "noreply@github.com"
          git add data/news.json data/meta.json || true
          if git diff --cached --quiet; then
            echo "No news changes."
          else
            git commit -m "chore(news): hourly ingest $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
