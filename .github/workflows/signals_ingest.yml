name: Signals ingest

# Pulls fresh deal-relevant SEC EDGAR filings (8-K, Form D) for tracked
# public propane operators and promotes M&A-tagged news articles to rumored
# signals. Runs daily; commits an updated data/signals.json (and refreshes
# data/meta.json) when the content has changed.

on:
  schedule:
    # 06:23 UTC every day. Stagger from the news job so EDGAR isn't hit twice
    # back-to-back, and time it post-overnight EDGAR ingestion.
    - cron: '23 6 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: signals-ingest
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run signals_ingest.py
        run: python scripts/signals_ingest.py

      - name: Commit if changed
        run: |
          git config user.name  "pi-signals-bot"
          git config user.email "noreply@github.com"
          git add data/signals.json data/meta.json || true
          if git diff --cached --quiet; then
            echo "No signals changes."
          else
            git commit -m "chore(signals): daily ingest $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
