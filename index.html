<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Propane Intelligence — Ergon Corporate Development</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/svg+xml" href="assets/logo.svg">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">

  <link rel="stylesheet" href="design-tokens/tokens.css">

  <style>
    html, body, #root { margin: 0; padding: 0; height: 100%; }
    body {
      background: #F6F9FC;
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #0A2540;
      -webkit-font-smoothing: antialiased;
      letter-spacing: -0.01em;
      overflow: hidden;
    }
    #boot {
      position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
      background: #F6F9FC; color: #425466; font-size: 13px; gap: 10px;
    }
    #boot .dot {
      width: 8px; height: 8px; border-radius: 50%; background: #635BFF;
      animation: pulse 1.2s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100% { opacity: 0.3; transform: scale(0.85); } 50% { opacity: 1; transform: scale(1); } }
  </style>
</head>
<body>
  <div id="root">
    <div id="boot"><span class="dot"></span> Loading Propane Intelligence…</div>
  </div>

  <!-- React + Babel (in-browser transpile, no build step) -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js"
          integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"
          crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"
          integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm"
          crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"
          integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y"
          crossorigin="anonymous"></script>

  <!-- Leaflet for production map view -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

  <!-- Demo anchor data (13 short IDs). Used for News bridge + map fallback only;
       real fields below are hydrated from companies.json via the demo→real merge. -->
  <script src="js/mockData.js"></script>

  <!-- Scoring engine (vanilla JS, exposes window.PI before any view loads). -->
  <script src="js/scoring.js"></script>

  <!-- Real-data adapter: loads companies.json + counties_national.json, runs the
       anchor merge, attaches scoring results, exposes window.MOCK_COMPANIES. -->
  <script>
    window.__DATA_READY__ = (async () => {
      // Demo short ID  ↔  canonical id in companies.json
      const DEMO_TO_REAL = {
        ll:  'lampton_love',
        blo: 'blossman_gas',
        ami: 'amerigas',
        fer: 'ferrellgas',
        che: 'cherry_energy',
        bar: 'barrett_propane',
        dea: 'dead_river',
        chs: 'chs_propane',
        cry: 'crystal_flash',
        edp: 'eastern_propane',
        ber: 'berico',
        dav: 'davenport_energy',
        dnd: 'dnd_gas',
      };
      const REAL_TO_DEMO = Object.fromEntries(Object.entries(DEMO_TO_REAL).map(([d, r]) => [r, d]));

      const ownershipToType = {
        public: ['public', 'Public'],
        pe: ['pe', 'PE-Backed'],
        'private equity': ['pe', 'PE-Backed'],
        family: ['family', 'Family'],
        private: ['private', 'Private'],
        cooperative: ['coop', 'Co-op'],
        'co-op': ['coop', 'Co-op'],
        coop: ['coop', 'Co-op'],
        ll: ['ll', 'Ergon'],
      };

      // Adapt a raw companies.json record into the unified shape the views read.
      // Preserves every v1 field; only renames a handful for the existing JSX.
      function adapt(c, opts) {
        const own = String(c.ownership || '').toLowerCase();
        const [type, typeLabel] = ownershipToType[own] || ['private', 'Private'];
        const isAnchor = c.id === 'lampton_love';
        const id = (opts && opts.id) || REAL_TO_DEMO[c.id] || c.id;
        return {
          // identity
          id,
          canonicalId: c.id,
          name: c.name,
          parent: c.parentGroup || c.ownerDetail || (own === 'public' ? 'Public' : 'Independent'),
          parentGroup: c.parentGroup,
          ownership: own || 'private',
          ownerDetail: c.ownerDetail,
          type, typeLabel,
          isPlatform: !!isAnchor,
          excluded: !!c.excluded,
          // geography
          hqCity: c.hqCity,
          hqState: c.hqState,
          states: Array.isArray(c.states) && c.states.length ? c.states : (c.hqState ? [c.hqState] : []),
          // ops/financials — keep nulls when unknown so the UI shows "—"
          totalLocs: Number(c.totalLocs) || (c.locations || []).length || 0,
          seLocs: Number(c.seLocs) || 0,
          locs: Number(c.totalLocs) || (c.locations || []).length || 0,   // alias for v2 views
          rev: c.estRevenue != null ? Math.round(c.estRevenue * 10) / 10 : null,
          estRevenue: c.estRevenue,
          emp: c.employeeCount != null ? c.employeeCount : null,
          employeeCount: c.employeeCount,
          yearFounded: c.yearFounded,
          estAnnualGallons: c.estAnnualGallons,
          // contact / metadata
          website: c.website,
          phone: c.phone,
          email: c.email,
          ticker: c.ticker,
          description: c.description,
          companyType: c.companyType,
          keyPersonnel: c.keyPersonnel || [],
          serviceTypes: c.serviceTypes || [],
          acquisitions: c.acquisitions || [],
          // location records (with lat/lng/address — required for map + detail panel)
          locations: c.locations || [],
        };
      }

      try {
        const [companiesRaw, countiesRaw] = await Promise.all([
          fetch('data/companies.json', { cache: 'no-cache' }).then(r => {
            if (!r.ok) throw new Error('companies.json ' + r.status);
            return r.json();
          }),
          fetch('data/counties_national.json', { cache: 'no-cache' }).then(r => {
            if (!r.ok) throw new Error('counties_national.json ' + r.status);
            return r.json();
          }).catch(err => { console.warn('[PI] counties load failed', err); return []; }),
        ]);

        window.REAL_COMPANIES = companiesRaw;
        window.COUNTY_METRICS = countiesRaw;

        // Build the unified company list:
        // 1) Each demo short-id slot gets HYDRATED with the matching real record's fields.
        //    The demo entry's short id (ll, blo, …) is preserved so News + map ID
        //    references continue to resolve.
        // 2) Every other real company is appended.
        const realById = Object.fromEntries(companiesRaw.map(c => [c.id, c]));
        const usedReal = new Set();
        const demoSeed = (window.MOCK_COMPANIES || []);
        const hydrated = demoSeed.map(d => {
          const realId = DEMO_TO_REAL[d.id];
          const r = realId ? realById[realId] : null;
          if (!r) return d; // keep mock if no real match (shouldn't happen)
          usedReal.add(realId);
          return adapt(r, { id: d.id });
        });
        const tail = companiesRaw
          .filter(c => !usedReal.has(c.id))
          .map(c => adapt(c));

        let companies = hydrated.concat(tail);

        // Attach proximity, county overlap, market share, fit breakdown, fit score.
        if (window.PI && typeof window.PI.attachScores === 'function') {
          window.PI.attachScores(companies, countiesRaw, 'll');
        } else {
          console.warn('[PI] scoring engine missing — fit scores unavailable');
        }

        window.MOCK_COMPANIES = companies;
        window.__COMPANY_COUNT__ = companies.length;
        window.__DEMO_TO_REAL__ = DEMO_TO_REAL;
        console.info('[PI] loaded', companies.length, 'companies,', (countiesRaw||[]).length, 'counties');
      } catch (err) {
        console.error('[PI] data load failed; falling back to demo data only', err);
        window.REAL_COMPANIES = [];
      }
    })();
  </script>

  <!-- Component layers (transpiled by Babel-standalone in the order listed) -->
  <script type="text/babel" src="js/shared-ui.jsx"></script>
  <script type="text/babel" src="js/Chrome.jsx"></script>
  <script type="text/babel" src="js/Logins.jsx"></script>
  <script type="text/babel" src="js/Views1.jsx"></script>
  <script type="text/babel" src="js/Views2.jsx"></script>
  <script type="text/babel" src="js/Views3.jsx"></script>
  <script type="text/babel" src="js/News.jsx"></script>
  <script type="text/babel" src="js/App.jsx"></script>

  <!-- Production root: auth gate + Dashboard -->
  <script type="text/babel" data-presets="env,react">
    const { Dashboard, LoginV1, LoginV2 } = window;

    const AUTH_KEY = 'pi_auth_v1';

    function Root() {
      const [authed, setAuthed] = React.useState(() => {
        try { return localStorage.getItem(AUTH_KEY) === '1'; } catch (e) { return false; }
      });
      // Toggle login variants with ?login=v2
      const variant = (new URLSearchParams(location.search).get('login') || 'v1').toLowerCase();
      // Initial dashboard view from ?view=
      const initialView = new URLSearchParams(location.search).get('view') || 'map';

      const handleLogin = () => {
        try { localStorage.setItem(AUTH_KEY, '1'); } catch (e) {}
        setAuthed(true);
      };

      if (!authed) {
        return variant === 'v2'
          ? <LoginV2 onLogin={handleLogin} fullscreen />
          : <LoginV1 onLogin={handleLogin} fullscreen />;
      }
      return <Dashboard initialView={initialView} />;
    }

    // Wait for the data adapter before rendering, so views see real company data.
    (window.__DATA_READY__ || Promise.resolve()).then(() => {
      const root = document.getElementById('root');
      // Strip the boot loader
      root.innerHTML = '';
      ReactDOM.createRoot(root).render(<Root/>);
    });
  </script>
</body>
</html>
